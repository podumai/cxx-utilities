name: macOS
on:
  pull_request:
    types:
      - opened
      - synchronize
      - closed
      - reopened
    branches:
      - master
    paths-ignore:
      - .github/**
  push:
    branches:
      - master
    paths-ignore:
      - .github/**

jobs:
  macos-build:
    strategy:
      fail-fast: false
      matrix:
        build_type: [ Release, Debug ]
        conan_preset: [ conan-release, conan-debug ]
        exclude:
          - build_type: Release
            conan_preset: conan-debug
          - build_type: Debug
            conan_preset: conan-release
    uses: podumai/cxx-utilities/.github/workflows/ci.yml@master
    with:
      os: macos-latest
      build_type: ${{ matrix.build_type }}
      configure_preset: ${{ matrix.conan_preset }}
      conan_preset: ${{ matrix.conan_preset }}
      compiler: apple-clang
