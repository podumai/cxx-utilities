name: CI/CD

on:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches: [ master ]
    paths-ignore:
      - .github/**
  push:
    tags: [ 'v*.*.*' ]

env:
  CPP_STD: 23

jobs:
  config:
    runs-on: ubuntu-24.04
    permissions: { }
    outputs:
      macos-image: ${{ steps.constants.outputs.macos-image }}
      apple-clang-compiler: ${{ steps.constants.outputs.apple-clang-compiler }}
      linux-image: ${{ steps.constants.outputs.linux-image }}
      clang-compiler: ${{ steps.constants.outputs.clang-compiler }}
    steps:
      - name: Define constants
        id: constants
        run: |
          echo "macos-image=macos-26" >> $GITHUB_OUTPUT
          echo "apple-clang-compiler=apple-clang-17" >> $GITHUB_OUTPUT
          echo "linux-image=ubuntu-24.04" >> $GITHUB_OUTPUT
          echo "clang-compiler=llvm-21" >> $GITHUB_OUTPUT

  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    needs: [ config ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ${{ needs.config.outputs.macos-image }}
            compiler: ${{ needs.config.outputs.apple-clang-compiler }}
          - os: ${{ needs.config.outputs.linux-image }}
            compiler: ${{ needs.config.outputs.clang-compiler }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup C++ infrastructure
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          cmake: true
          ninja: true
          conan: true

      - name: Map runner configuration to profile
        id: os
        run: |
          case ${{ runner.os }} in
            "macOS") echo "OS=macos" >> $GITHUB_ENV;;
            "Linux") echo "OS=linux" >> $GITHUB_ENV;;
          esac
          
          case ${{ runner.arch }} in
            "X64") echo "ARCH=x86_64" >> $GITHUB_ENV;;
            "ARM64") echo "ARCH=arm64" >> $GITHUB_ENV;;
          esac

      - name: Find conan profile
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" != "true" ]]; then
            echo "CONAN_INSTALL_PROFILE=${{ env.OS }}-${{ env.ARCH }}-debug" >> $GITHUB_ENV
          else
            echo "CONAN_INSTALL_PROFILE=${{ env.OS }}-${{ env.ARCH }}-static" >> $GITHUB_ENV
          fi

      - name: Install project dependencies
        run: conan install . --build=missing --profile:all=./profiles/${{ env.CONAN_INSTALL_PROFILE }}

      - name: Setup conan configuration
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" != "true" ]]; then
            echo "CONAN_CONFIG_PRESET=conan-debug" >> $GITHUB_ENV
            echo "CONAN_BUILD_PRESET=conan-debug" >> $GITHUB_ENV
          else
            echo "CONAN_CONFIG_PRESET=conan-release" >> $GITNUB_ENV
            echo "CONAN_BUILD_PRESET=conan-release" >> $GITHUB_ENV
          fi

      - name: Build project
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" != "true" ]]; then
            cmake --preset ${{ env.CONAN_CONFIG_PRESET }}
            cmake --build --preset ${{ env.CONAN_BUILD_PRESET }}
          else
            cmake --preset ${{ env.CONAN_CONFIG_PRESET }} -DCI_CD_RELEASE=ON
            cmake --build --preset ${{ env.CONAN_BUILD_PRESET }} --target App
          fi

      - name: Find conan config home
        run: echo "CONAN_CONFIG_HOME=$(conan config home)" >> $GITHUB_ENV

      - name: Cache conan packages
        uses: actions/cache@v5
        with:
          path: ${{ env.CONAN_CONFIG_HOME }}
          key: conan-${{ runner.os }}

      - name: Prepare build artifacts for save
        run: tar -czf build-archive-${{ runner.os }}.tar.gz CMakeUserPresets.json build

      - name: Save build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-archive-${{ runner.os }}
          path: build-archive-${{ runner.os }}.tar.gz
          retention-days: 3
          overwrite: true

  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ${{ needs.config.outputs.macos-image }}
            compiler: ${{ needs.config.outputs.apple-clang-compiler }}
          - os: ${{ needs.config.outputs.linux-image }}
            compiler: ${{ needs.config.outputs.clang-compiler }}
    needs: [ config, build ]
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Setup C++ infrastructure
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          conan: true
          cmake: true
          ninja: true

      - name: Find conan config home
        run: echo "CONAN_CONFIG_HOME=$(conan config home)" >> $GITHUB_ENV

      - name: Restore conan2 cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CONAN_CONFIG_HOME }}
          key: conan-${{ runner.os }}

      - name: Restore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-archive-${{ runner.os }}

      - name: Unarchive build artifacts
        run: tar -xzf build-archive-${{ runner.os }}.tar.gz

      - name: Find conan generated test preset
        run: |
          if [[ "${{ startsWith(github.ref, 'refs/tags/') }}" != 'true' ]]; then
            echo "CONAN_TEST_PRESET=conan-debug" >> $GITHUB_ENV
          else
            echo "CONAN_TEST_PRESET=conan-release" >> $GITHUB_ENV
          fi

      - name: Run unit-tests
        run: ctest --preset ${{ env.CONAN_TEST_PRESET }}

  archive:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      actions: write
    needs: [ test ]
    if: always() && needs.test.result == 'success' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts (macOS)
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-macOS
          path: macOS

      - name: Download build artifacts (Linux)
        uses: actions/download-artifact@v4
        with:
          name: build-artifact-Linux
          path: Linux

      - name: Make archive release executable (macOS)
        run: tar -czf macos-arm64.tar.gz -C ./macOS/build/Release/bin .

      - name: Make archive release executable (Linux)
        run: tar -czf linux-x86_64.tar.gz -C ./Linux/build/Release/bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: ./*.tar.gz
          retention-days: 1
          overwrite: true

  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs: [ archive ]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download archived executables
        uses: actions/download-artifact@v4
        with:
          name: release-archives

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./*.tar.gz
          fail_on_unmatched_files: true
