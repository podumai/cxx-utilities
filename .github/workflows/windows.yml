name: windows-2025

on:
  pull_request:
    types:
      - opened
      - synchronize
      - closed
      - reopened
    branches:
      - master
    paths-ignore:
      - .github/**
      - ./profiles/
  push:
    branches:
      - master
    paths-ignore:
      - .github/**
      - ./profiles/

jobs:
  windows-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            conan_preset: conan-release
          - build_type: Debug
            conan_preset: conan-debug
    uses: podumai/cxx-utilities/.github/workflows/ci.yml@master
    with:
      os: windows-2025
      build_type: ${{ matrix.build_type }}
      configure_preset: conan-default
      conan_preset: ${{ matrix.conan_preset }}
      compiler: msvc-193
